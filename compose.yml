services:
  mongodb:
    image: mongo:latest
    container_name: reactive_mongo
    ports:
      - "27017"
    environment:
      - MONGO_INITDB_DATABASE=chat_db

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: